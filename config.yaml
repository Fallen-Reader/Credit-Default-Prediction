
data:
  raw_path: "Data/raw/german_credit_data.csv"
  processed_path: "Data/processed/cleaned.csv"
  target_col: "target"
  train_ds : "Data/processed/train.csv"
  test_ds : "Data/processed/test.csv"

split:
  test_size: 0.2
  random_seed: 42

models:
  LogisticRegression:
    class: "sklearn.linear_model.LogisticRegression"
    params:
      max_iter: 1000
      random_state: 42
    class_weight: null         
  
  LogisticRegression_Balanced:
    class: "sklearn.linear_model.LogisticRegression"
    params:
      max_iter: 1000
      random_state: 42
    class_weight: "balanced"
  
  NaiveBayes:
    class: "sklearn.naive_bayes.GaussianNB"
    params: {}
    class_weight: null
  
  DecisionTree:
    class: "sklearn.tree.DecisionTreeClassifier"
    params:
      max_depth: 5
      min_samples_split: 10
      random_state: 42
    class_weight: null
  
  RandomForest:
    class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 5
      random_state: 42
    class_weight: null
  
  RandomForest_Balanced:
    class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 5
      random_state: 42
    class_weight: "balanced"
  
  GradientBoosting:
    class: "sklearn.ensemble.GradientBoostingClassifier"
    params:
      n_estimators: 100
      max_depth: 3
      learning_rate: 0.1
      random_state: 42
    class_weight: null
  
  SVM:
    class: "sklearn.svm.SVC"
    params:
      C: 1.0
      kernel: "rbf"
      probability: true
      random_state: 42
    class_weight: null


metrics:
  - "roc_auc"
  - "accuracy"
  - "precision"
  - "recall"
  - "f1"
