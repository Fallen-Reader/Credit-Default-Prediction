
data:
  raw_path: "Data/raw/german_credit_data.csv"
  processed_path: "Data/processed/cleaned.csv"
  target_col: "target"
  train_ds : "Data/processed/train.csv"
  test_ds : "Data/processed/test.csv"
  stratify: true
  verbose : false

split:
  test_size: 0.2
  random_seed: 42

models:
  LogisticRegression:
    class: "sklearn.linear_model.LogisticRegression"
    params:
      max_iter: 1000
      random_state: 42
    class_weight: null         
  
  LogisticRegression_Balanced:
    class: "sklearn.linear_model.LogisticRegression"
    params:
      max_iter: 1000
      random_state: 42
    class_weight: "balanced"
  
  NaiveBayes:
    class: "sklearn.naive_bayes.GaussianNB"
    params: {}
    class_weight: null
  
  DecisionTree:
    class: "sklearn.tree.DecisionTreeClassifier"
    params:
      max_depth: 5
      min_samples_split: 10
      random_state: 42
    class_weight: null
  
  RandomForest:
    class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 5
      random_state: 42
    class_weight: null
  
  RandomForest_Balanced:
    class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 5
      random_state: 42
    class_weight: "balanced"
  
  GradientBoosting:
    class: "sklearn.ensemble.GradientBoostingClassifier"
    params:
      n_estimators: 100
      max_depth: 3
      learning_rate: 0.1
      random_state: 42
    class_weight: null
  
  SVM:
    class: "sklearn.svm.SVC"
    params:
      C: 1.0
      kernel: "rbf"
      probability: true
      random_state: 42
    class_weight: null


metrics:
  - "roc_auc"
  - "accuracy"
  - "precision"
  - "recall"
  - "f1"

tuning :
  n_jobs: 2
  n_iter: 20
  cv_fold: 5

  rf_grid: 
    n_estimators   : [100, 200, 300]
    max_depth : [3, 5, 7, None]
    min_samples_split : [2, 5, 10]
    max_features : ['sqrt', 'log2']
  
  gs_grid:
    n_estimators : [100, 200, 300]
    max_depth : [2, 3, 4] 
    learning_rate : [0.01, 0.05, 0.1]
    subsample : [0.8, 1.0]
    
output:
  model_dir: "outputs/models/"
  plots_dir: "outputs/plots/"
  result_: "outputs/result.csv"

model_path:
  DecisionTree: "outputs/models/decisiontree.pkl"
  SVM: "outputs/models/svm.pkl"
  GradientBoosting: "outputs/models/gradientboosting.pkl"
  RandomForest_Balanced: "outputs/models/randomforest_balanced.pkl"
  NaiveBayes: "outputs/models/naivebayes.pkl"
  random_forest_tuned : "outputs/models/random_forest_tuned.pkl"
  gradient_boosting_tuned : "outputs/models/gradient_boosting_tuned.pkl"


evaluation:
  threshold: 0.45
  best_model: "random_forest_tuned"
  output_path: "outputs/plots/"